# HAPI FHIR Configuration
# This file will be mounted into the HAPI FHIR container

hapi:
  fhir:
    # Server settings
    fhir_version: R4

    # Clinical Reasoning Module (enables $populate, $extract, CQL operations)
    cr:
      enabled: true

    # Implementation Guides - Auto-install at startup
    implementationguides:
      # MII PRO (Medizininformatik Initiative PRO)
      # DISABLED: Requires Simplifier authentication (pre-release ballot package)
      # mii_pro:
      #   name: de.medizininformatikinitiative.kerndatensatz.pro
      #   version: 2026.0.0-ballot
      #   installMode: STORE_AND_INSTALL
      #   packageUrl: https://packages.simplifier.net/de.medizininformatikinitiative.kerndatensatz.pro/2026.0.0-ballot
      #   reloadExisting: false
      #   fetchDependencies: true

      # SDC (Structured Data Capture) Implementation Guide
      # Provides Questionnaire profiles and operations for form management
      # Loaded from a locally-patched tarball: HL7 ships SDC 3.0.0 with status=draft
      # on all SD/CS/VS, which HAPI's PackageInstallerSvc rejects on auto-install.
      # The build step in Dockerfile.form-manager flips status to "active" before bundling.
      sdc:
        name: hl7.fhir.uv.sdc
        version: 3.0.0
        installMode: STORE_AND_INSTALL
        packageUrl: file:///data/hapi/local-packages/hl7.fhir.uv.sdc-3.0.0.tgz
        reloadExisting: false
        fetchDependencies: false
      mii_pros:
        name: de.medizininformatikinitiative.kerndatensatz.pros
        version: 2026.3.0
        installMode: STORE_AND_INSTALL
        packageUrl: file:///data/hapi/local-packages/de.medizininformatikinitiative.kerndatensatz.pros-2026.3.0.tgz
        reloadExisting: false
        fetchDependencies: false

      # PRO Library (BIH-CEI) — companion content package, loaded in parallel to MII PRO.
      # 0.x line is provisional under BIH-CEI stewardship (see VISION.md §1a on the
      # authority gap). Derived from MII PRO 2026.3.0; SemVer per artefact.
      # Source: https://github.com/BIH-CEI/pro-library
      pro_library:
        name: bih-cei.fhir.pro-library
        version: 0.1.3
        installMode: STORE_AND_INSTALL
        packageUrl: file:///data/hapi/local-packages/bih-cei.fhir.pro-library-0.1.3.tgz
        reloadExisting: false
        fetchDependencies: false


      # German ISiK (German Interoperability Standard)
      # DISABLED: Snapshot generation causes HAPI startup failure
      # Error: HAPI-1290 when generating snapshot for ISiKKoerperkerntemperatur
      # Even STORE_ONLY mode triggers snapshot generation during installation
      # Workaround: Runtime installation via scripts/install-isik-runtime.py
      # The docker-compose.yml isik-installer service runs this automatically
      # isik:
      #   name: de.gematik.isik
      #   version: 5.1.0
      #   installMode: STORE_ONLY
      #   reloadExisting: false
      #   fetchDependencies: false

    # Validation
    # Enabled for SDC profile validation
    # Request-time validation is intentionally OFF on this server.
    # Reasoning: validation belongs at publication time (in the dedicated
    # Reference Validation Service container — VISION.md WP8b) and at
    # consumer-side write time, NOT during our own bootstrap loading.
    # The MII PRO upstream Questionnaires (and our derivedFrom overlays)
    # have known non-fatal validation issues (e.g. translation extension
    # placement) that would block PUT — those are conformance concerns
    # handled separately, not boot-loading concerns.
    validation:
      enabled: false
      requests_enabled: false

    # Subscription (optional)
    subscription:
      enabled: false
