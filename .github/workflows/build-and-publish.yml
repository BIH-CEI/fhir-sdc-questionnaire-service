name: Build, Smoke-Test & Publish Form Manager Image

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fhir-sdc-form-manager
  MII_PRO_VERSION: "2026.3.0"

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=mii-pro-${{ env.MII_PRO_VERSION }},enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=ref,event=tag

      - name: Build form-manager image (load to local for testing)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.form-manager
          load: true
          tags: fhir-sdc-form-manager:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image (boot HAPI, assert MII PRO loaded)
        run: |
          docker run -d --name fm-smoketest -p 18095:8080 \
            -e spring.datasource.url=jdbc:h2:mem:testdb \
            -e spring.datasource.driverClassName=org.h2.Driver \
            -e spring.datasource.username=sa -e spring.datasource.password= \
            -e spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect \
            fhir-sdc-form-manager:ci

          echo "Waiting for HAPI to be reachable..."
          timeout 120 bash -c 'until curl -sf http://localhost:18095/fhir/metadata -o /dev/null; do sleep 3; done'
          sleep 8

          MII_PRO_COUNT=$(curl -sf "http://localhost:18095/fhir/StructureDefinition?version=${MII_PRO_VERSION}&_summary=count" \
                          | python3 -c "import sys,json; print(json.load(sys.stdin).get('total', 0))")
          echo "MII PRO ${MII_PRO_VERSION} StructureDefinitions in image: $MII_PRO_COUNT"

          if [ "$MII_PRO_COUNT" -lt 20 ]; then
            echo "::error::MII PRO ${MII_PRO_VERSION} did not load correctly (expected ≥20 SDs, got $MII_PRO_COUNT)"
            docker logs fm-smoketest | tail -100
            exit 1
          fi

          echo "::notice::Image smoke test passed: $MII_PRO_COUNT MII PRO ${MII_PRO_VERSION} profiles loaded"
          docker rm -f fm-smoketest

      - name: Set up Python for SDC compliance tests
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: api/requirements*.txt

      - name: Install Python deps
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        run: |
          cd api
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run SDC compliance & integration tests against built image
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        env:
          FORM_MANAGER_IMAGE: fhir-sdc-form-manager:ci
        run: |
          docker compose -f docker-compose.test.yml up -d
          timeout 120 bash -c 'until curl -sf http://localhost:8081/fhir/metadata -o /dev/null; do sleep 3; done'
          sleep 10
          cd api
          pytest tests/sdc_compliance/ tests/integration/ -v --tb=short

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs --tail=300 || true
          docker logs fm-smoketest 2>&1 | tail -200 || true

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v || true

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch, only on master/tag)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.form-manager
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
