name: SDC Compliance & Integration Tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

env:
  MII_PRO_VERSION: "2026.3.0"

# Runs in parallel with the image-publish workflow (build-and-publish.yml).
# Both share the same buildx GHA cache, so the second one to start reuses
# layers and gets to its real work in seconds.

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build form-manager image (load locally, shared GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.form-manager
          load: true
          tags: fhir-sdc-form-manager:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: api/requirements*.txt

      - name: Install Python deps
        run: |
          cd api
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Start test stack (HAPI image + FastAPI sidecar)
        env:
          FORM_MANAGER_IMAGE: fhir-sdc-form-manager:ci
        run: |
          docker compose -f docker-compose.test.yml up -d
          echo "Waiting for HAPI to be reachable..."
          timeout 120 bash -c 'until curl -sf http://localhost:8081/fhir/metadata -o /dev/null; do sleep 3; done'
          sleep 10

      - name: Run SDC compliance + integration tests (with coverage)
        run: |
          cd api
          pytest tests/sdc_compliance/ tests/integration/ \
            -v --tb=short --color=yes \
            --cov=app --cov-report=xml --cov-report=html --cov-report=term

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./api/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            api/htmlcov/
            api/coverage.xml

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs --tail=300 || true

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v || true
